<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 280" width="680" height="280" role="img" aria-label="Animated terminal — praveen's introduction">
  <defs>
    <clipPath id="clip1"><rect x="20" y="50" width="0" height="22"><animate attributeName="width" values="0;0;80;80;0;0" keyTimes="0;0.0214;0.05;0.9714;0.975;1" dur="14s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="clip2"><rect x="20" y="73" width="0" height="22"><animate attributeName="width" values="0;0;360;360;0;0" keyTimes="0;0.0571;0.1571;0.9714;0.975;1" dur="14s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="clip3"><rect x="20" y="110" width="0" height="22"><animate attributeName="width" values="0;0;120;120;0;0" keyTimes="0;0.1786;0.2179;0.9714;0.975;1" dur="14s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="clip4"><rect x="20" y="133" width="0" height="22"><animate attributeName="width" values="0;0;560;560;0;0" keyTimes="0;0.225;0.3536;0.9714;0.975;1" dur="14s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="clip5"><rect x="20" y="170" width="0" height="22"><animate attributeName="width" values="0;0;130;130;0;0" keyTimes="0;0.375;0.4179;0.9714;0.975;1" dur="14s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="clip6"><rect x="20" y="193" width="0" height="22"><animate attributeName="width" values="0;0;620;620;0;0" keyTimes="0;0.425;0.575;0.9714;0.975;1" dur="14s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="clipPrompt7"><rect x="20" y="233" width="0" height="22"><animate attributeName="width" values="0;0;10;10;0;0" keyTimes="0;0.5857;0.5929;0.9714;0.975;1" dur="14s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="clip7"><rect x="36" y="233" width="0" height="22"><animate attributeName="width" values="0;0;50;50;0;0" keyTimes="0;0.9071;0.9357;0.9714;0.975;1" dur="14s" repeatCount="indefinite"/></rect></clipPath>
  </defs>

  <!-- Terminal window background -->
  <rect width="680" height="280" rx="10" fill="#0d1117"/>

  <!-- Titlebar with rounded top corners -->
  <path d="M0,10 A10,10 0 0 1 10,0 L670,0 A10,10 0 0 1 680,10 L680,32 L0,32 Z" fill="#161b22"/>
  <line x1="0" y1="32" x2="680" y2="32" stroke="#21262d" stroke-width="1"/>

  <!-- Traffic-light controls -->
  <circle cx="18" cy="16" r="5.5" fill="#ff5f57"/>
  <circle cx="38" cy="16" r="5.5" fill="#febc2e"/>
  <circle cx="58" cy="16" r="5.5" fill="#28c840"/>

  <!-- Window title -->
  <text x="340" y="20" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11" fill="#7d8590">praveen-ks-2001 — zsh</text>

  <!-- Terminal content -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13">

    <!-- Line 1: $ whoami -->
    <text x="20" y="65" clip-path="url(#clip1)"><tspan fill="#7d8590">$ </tspan><tspan fill="#e6edf3">whoami</tspan></text>

    <!-- Line 2: output -->
    <text x="20" y="88" clip-path="url(#clip2)"><tspan fill="#3fb950">praveen</tspan><tspan fill="#7d8590"> — </tspan><tspan fill="#e6edf3">data scientist · wanderer @ </tspan><tspan fill="#f85149">♥</tspan></text>

    <!-- Line 3: $ cat now.md -->
    <text x="20" y="125" clip-path="url(#clip3)"><tspan fill="#7d8590">$ </tspan><tspan fill="#e6edf3">cat now.md</tspan></text>

    <!-- Line 4: output -->
    <text x="20" y="148" fill="#e6edf3" clip-path="url(#clip4)">juggling ml pipelines, inference tricks, late-night tinkering</text>

    <!-- Line 5: $ cat also.md -->
    <text x="20" y="185" clip-path="url(#clip5)"><tspan fill="#7d8590">$ </tspan><tspan fill="#e6edf3">cat also.md</tspan></text>

    <!-- Line 6: output -->
    <text x="20" y="208" fill="#e6edf3" clip-path="url(#clip6)">exploring open source, reading, building &amp; breaking every other thing</text>

    <!-- Line 7 prompt $ (appears after line 6) -->
    <text x="20" y="248" fill="#7d8590" clip-path="url(#clipPrompt7)">$</text>

    <!-- Line 7 "clear" command (types after the pause) -->
    <text x="36" y="248" fill="#e6edf3" clip-path="url(#clip7)">clear</text>

    <!-- Cursor: visible during the pause, blinks -->
    <g>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.5857;0.5858;0.9071;0.9072;1" dur="14s" repeatCount="indefinite"/>
      <rect x="36" y="236" width="8" height="15" fill="#e6edf3">
        <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
</svg>
