<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 280" width="680" height="280" role="img" aria-label="Animated terminal — praveen's introduction">
  <defs>
    <clipPath id="clip1"><rect x="36" y="50" width="0" height="22"><animate attributeName="width" from="0" to="80" dur="0.35s" begin="0.3s" fill="freeze"/></rect></clipPath>
    <clipPath id="clip2"><rect x="20" y="73" width="0" height="22"><animate attributeName="width" from="0" to="400" dur="1.2s" begin="0.8s" fill="freeze"/></rect></clipPath>
    <clipPath id="clip3"><rect x="36" y="110" width="0" height="22"><animate attributeName="width" from="0" to="130" dur="0.5s" begin="2.2s" fill="freeze"/></rect></clipPath>
    <clipPath id="clip4"><rect x="20" y="133" width="0" height="22"><animate attributeName="width" from="0" to="440" dur="1.5s" begin="2.9s" fill="freeze"/></rect></clipPath>
    <clipPath id="clip5"><rect x="36" y="170" width="0" height="22"><animate attributeName="width" from="0" to="110" dur="0.45s" begin="4.6s" fill="freeze"/></rect></clipPath>
    <clipPath id="clip6"><rect x="20" y="193" width="0" height="22"><animate attributeName="width" from="0" to="380" dur="1.3s" begin="5.25s" fill="freeze"/></rect></clipPath>
  </defs>

  <!-- Terminal window background -->
  <rect width="680" height="280" rx="10" fill="#0d1117"/>

  <!-- Titlebar with rounded top corners -->
  <path d="M0,10 A10,10 0 0 1 10,0 L670,0 A10,10 0 0 1 680,10 L680,32 L0,32 Z" fill="#161b22"/>
  <line x1="0" y1="32" x2="680" y2="32" stroke="#21262d" stroke-width="1"/>

  <!-- Traffic-light controls -->
  <circle cx="18" cy="16" r="5.5" fill="#ff5f57"/>
  <circle cx="38" cy="16" r="5.5" fill="#febc2e"/>
  <circle cx="58" cy="16" r="5.5" fill="#28c840"/>

  <!-- Window title -->
  <text x="340" y="20" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11" fill="#7d8590">praveen-ks-2001 — zsh</text>

  <!-- Terminal content -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13">

    <!-- $ whoami -->
    <text x="20" y="65" fill="#7d8590">$</text>
    <text x="36" y="65" fill="#e6edf3" clip-path="url(#clip1)">whoami</text>

    <!-- output -->
    <text x="20" y="88" clip-path="url(#clip2)"><tspan fill="#3fb950">praveen</tspan><tspan fill="#7d8590"> — </tspan><tspan fill="#e6edf3">data scientist · open source @ </tspan><tspan fill="#f85149">♥</tspan></text>

    <!-- $ cat focus.md -->
    <text x="20" y="125" fill="#7d8590">$</text>
    <text x="36" y="125" fill="#e6edf3" clip-path="url(#clip3)">cat focus.md</text>

    <!-- output -->
    <text x="20" y="148" fill="#e6edf3" clip-path="url(#clip4)">making open source feel welcoming, one PR at a time</text>

    <!-- $ ls pinned/ -->
    <text x="20" y="185" fill="#7d8590">$</text>
    <text x="36" y="185" fill="#e6edf3" clip-path="url(#clip5)">ls pinned/</text>

    <!-- output -->
    <text x="20" y="208" fill="#58a6ff" clip-path="url(#clip6)">claude-code-cheat-sheet/  openclaw-railway/</text>

    <!-- Final prompt with blinking cursor -->
    <text x="20" y="248" fill="#7d8590">$</text>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="6.7s" fill="freeze"/>
      <rect x="36" y="236" width="8" height="15" fill="#e6edf3">
        <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
</svg>
